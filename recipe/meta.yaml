{% set name = "lightning" %}
{% set version = "2.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 881841716b59c1837ae0c562c2e64fea9bcf49ef9de3867bd1f868557ec23d04

build:
  entry_points:
    - fabric = lightning.fabric.cli:_main
    - lightning = lightning.fabric.cli:_legacy_main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  number: 0
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
    - packaging
  run:
    - python
    # The pinnings below are extracted from lightning.egg-info/requires.txt
    # This is because the requirements under requirements/ are transformed
    # before being used by the setup script
    - pyyaml <8.0,>5.4
    ## fsspec[http] ##
    - fsspec <2027.0,>=2022.5.0
    - aiohttp !=4.0.0a0,!=4.0.0a1
    - requests
    ## fsspec[http] ##
    - lightning-utilities <2.0,>=0.10.0
    - numpy >=1.17.2,<3.0
    - packaging <27.0,>=20.0
    - pytorch <4.0,>=2.1.0
    - torchmetrics <3.0,>0.7.0
    - tqdm <6.0,>=4.57.0
    - typing-extensions >=4.4.0,<6.0
    - pytorch-lightning
    # click is necessary to use the entry-points
    - click
    - typing_extensions <6.0,>4.5.0
  run_constrained:
    - hydra-core <2.0,>=1.2.0
    - jsonargparse <5.0,>=4.39.0
    - matplotlib-base <4.0,>3.1
    - omegaconf <3.0,>=2.2.3
    - rich <15.0,>=12.3.0
    - tensorboardX <3.0,>=2.2

test:
  imports:
    - lightning
  commands:
    - pip check
    - lightning --help
    - fabric --help
  requires:
    - pip

about:
  home: https://github.com/Lightning-AI/pytorch-lightning
  summary: Use Lightning Apps to build everything from production-ready, multi-cloud ML systems to simple research demos.
  description: Use Lightning Apps to build everything from production-ready, multi-cloud ML systems to simple research demos.
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
  dev_url: https://github.com/Lightning-AI/pytorch-lightning
  doc_url: https://lightning.ai/docs/app/stable/

extra:
  recipe-maintainers:
    - Borda
    - weiji14
